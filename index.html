<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9AU FOREX EA — Portfolio Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --panel:#131720;
    --panel-hover:#171C27;
    --border:#232938;
    --text:#E8EAED;
    --muted:#7A8699;
    --amber:#D4A94A;
    --amber-dim:rgba(212,169,74,0.12);
    --teal:#3FA796;
    --teal-dim:rgba(63,167,150,0.12);
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:28px 24px 20px;
    border-bottom:1px solid var(--border);
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    max-width:1200px;
    margin:0 auto;
  }
  h1{
    font-family:var(--mono);
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
    margin:0;
  }
  h1 span{color:var(--muted);font-weight:400;}
  .updated{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
  }
  .ticker{
    max-width:1200px;
    margin:16px auto 0;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    font-family:var(--mono);
    font-size:13px;
  }
  .ticker-item{color:var(--muted);}
  .ticker-item b{color:var(--text);font-weight:600;}
  .ticker-item.hm b{color:var(--amber);}
  .ticker-item.cp b{color:var(--teal);}

  .controls{
    max-width:1200px;
    margin:20px auto 0;
    padding:0 24px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .seg{
    display:flex;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .seg button{
    background:var(--panel);
    color:var(--muted);
    border:none;
    padding:8px 14px;
    font-family:var(--sans);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    border-right:1px solid var(--border);
  }
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--text);color:var(--bg);}
  .seg button:hover:not(.active){color:var(--text);}

  input[type="search"], select{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 12px;
    border-radius:8px;
    font-family:var(--sans);
    font-size:13px;
  }
  input[type="search"]{min-width:180px;}
  input[type="search"]::placeholder{color:var(--muted);}

  main{
    max-width:1200px;
    margin:24px auto 60px;
    padding:0 24px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }
  @media (max-width:900px){
    .grid{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:640px){
    .grid{grid-template-columns:1fr;}
    .title-row{flex-direction:column;}
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-left:4px solid var(--muted);
    border-radius:10px;
    padding:16px 18px;
    transition:background 0.15s ease, transform 0.15s ease;
  }
  .card:hover{background:var(--panel-hover);transform:translateY(-1px);}
  .card.hm{border-left-color:var(--amber);}
  .card.cp{border-left-color:var(--teal);}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .symbol{
    font-family:var(--mono);
    font-size:18px;
    font-weight:600;
  }
  .ea-name{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
    word-break:break-all;
  }
  .badge{
    font-family:var(--sans);
    font-size:10px;
    font-weight:600;
    padding:3px 8px;
    border-radius:100px;
    white-space:nowrap;
    text-transform:uppercase;
    letter-spacing:0.3px;
  }
  .badge.hm{background:var(--amber-dim);color:var(--amber);}
  .badge.cp{background:var(--teal-dim);color:var(--teal);}
  .badge.status{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    margin-left:6px;
  }

  .metrics{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px 4px;
    margin:12px 0;
  }
  .metric{font-family:var(--mono);}
  .metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;}
  .metric-value{font-size:14px;font-weight:600;}

  .dd-bar-wrap{margin-top:10px;}
  .dd-bar-label{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:10px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .dd-bar{
    height:5px;
    background:#1B212D;
    border-radius:4px;
    overflow:hidden;
  }
  .dd-bar-fill{height:100%;border-radius:4px;}
  .dd-bar-fill.hm{background:var(--amber);}
  .dd-bar-fill.cp{background:var(--teal);}

  .net-profit{
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .net-profit-label{font-size:11px;color:var(--muted);}
  .net-profit-value{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);}

  footer{
    text-align:center;
    padding:20px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    border-top:1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>9AU FOREX EA <span>/ Portfolio Dashboard</span></h1>
    <div class="updated" id="updated"></div>
  </div>
  <div class="ticker" id="ticker"></div>
</header>

<div class="controls">
  <div class="seg" id="modeFilter">
    <button data-mode="all" class="active">All</button>
    <button data-mode="House Money">House Money</button>
    <button data-mode="Compound">Compound</button>
  </div>
  <select id="sortBy">
    <option value="sharpe">Sort: Sharpe (สูง→ต่ำ)</option>
    <option value="pf">Sort: Profit Factor (สูง→ต่ำ)</option>
    <option value="dd">Sort: Equity DD (ต่ำ→สูง)</option>
    <option value="net_profit">Sort: Net Profit (สูง→ต่ำ)</option>
  </select>
  <input type="search" id="search" placeholder="ค้นหา Symbol หรือชื่อ EA...">
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Data synced from Obsidian Vault — EA_Trade / 02_EA_PROJECTS · Classification: Max DD &lt; 18% = Compound, &ge; 18% = House Money
</footer>

<script id="ea-data" type="application/json">

<script>
const DATA = JSON.parse(document.getElementById('ea-data').textContent);
const eaList = DATA.ea;

function modeClass(mode){ return mode === 'House Money' ? 'hm' : 'cp'; }

function renderTicker(){
  const hm = eaList.filter(e => e.mode === 'House Money').length;
  const cp = eaList.filter(e => e.mode === 'Compound').length;
  const avgSharpe = (eaList.reduce((s,e)=>s+e.sharpe,0)/eaList.length).toFixed(2);
  document.getElementById('ticker').innerHTML = `
    <span class="ticker-item">EA ทั้งหมด <b>${eaList.length}</b></span>
    <span class="ticker-item hm">House Money <b>${hm}</b></span>
    <span class="ticker-item cp">Compound <b>${cp}</b></span>
    <span class="ticker-item">Avg Sharpe <b>${avgSharpe}</b></span>
  `;
  document.getElementById('updated').textContent = 'Updated ' + DATA.generated;
}

function renderCards(list){
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(e => {
    const mc = modeClass(e.mode);
    const ddPct = Math.min(e.dd, 40) / 40 * 100;
    const statusBadge = e.status !== 'Active' ? `<span class="badge status">${e.status}</span>` : '';
    return `
      <div class="card ${mc}">
        <div class="card-top">
          <div>
            <div class="symbol">${e.symbol}</div>
            <div class="ea-name">${e.name}</div>
          </div>
          <div><span class="badge ${mc}">${e.mode}</span>${statusBadge}</div>
        </div>
        <div class="metrics">
          <div class="metric"><div class="metric-label">PF</div><div class="metric-value">${e.pf.toFixed(2)}</div></div>
          <div class="metric"><div class="metric-label">Sharpe</div><div class="metric-value">${e.sharpe.toFixed(2)}</div></div>
          <div class="metric"><div class="metric-label">RF</div><div class="metric-value">${e.rf.toFixed(2)}</div></div>
          <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value">${e.winrate.toFixed(1)}%</div></div>
          <div class="metric"><div class="metric-label">Magic</div><div class="metric-value">${e.magic}</div></div>
          <div class="metric"><div class="metric-label">DD</div><div class="metric-value">${e.dd.toFixed(2)}%</div></div>
        </div>
        <div class="dd-bar-wrap">
          <div class="dd-bar-label"><span>Equity DD</span><span>18% threshold</span></div>
          <div class="dd-bar"><div class="dd-bar-fill ${mc}" style="width:${ddPct}%"></div></div>
        </div>
        <div class="net-profit">
          <span class="net-profit-label">Net Profit</span>
          <span class="net-profit-value">${e.net_profit.toFixed(2)}%</span>
        </div>
      </div>
    `;
  }).join('');
}

function applyFiltersAndRender(){
  const mode = document.querySelector('#modeFilter button.active').dataset.mode;
  const query = document.getElementById('search').value.trim().toLowerCase();
  const sortBy = document.getElementById('sortBy').value;

  let list = eaList.filter(e => mode === 'all' || e.mode === mode);
  if(query){
    list = list.filter(e => e.symbol.toLowerCase().includes(query) || e.name.toLowerCase().includes(query));
  }
  list = [...list].sort((a,b) => {
    if(sortBy === 'dd') return a.dd - b.dd;
    return b[sortBy] - a[sortBy];
  });
  renderCards(list);
}

document.querySelectorAll('#modeFilter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#modeFilter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFiltersAndRender();
  });
});
document.getElementById('sortBy').addEventListener('change', applyFiltersAndRender);
document.getElementById('search').addEventListener('input', applyFiltersAndRender);

renderTicker();
applyFiltersAndRender();
</script>

</body>
</html>
