<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9AU FOREX EA — Portfolio Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- เรียกใช้งาน Chart.js สำหรับวาดกราฟ Radar -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg:#0B0E14;
    --panel:#131720;
    --panel-hover:#171C27;
    --border:#232938;
    --text:#E8EAED;
    --muted:#7A8699;
    --amber:#D4A94A;
    --amber-dim:rgba(212,169,74,0.12);
    --teal:#3FA796;
    --teal-dim:rgba(63,167,150,0.12);
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:28px 24px 20px;
    border-bottom:1px solid var(--border);
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    max-width:1200px;
    margin:0 auto;
  }
  h1{
    font-family:var(--mono);
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
    margin:0;
  }
  h1 span{color:var(--muted);font-weight:400;}
  .updated{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
  }
  .ticker{
    max-width:1200px;
    margin:16px auto 0;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    font-family:var(--mono);
    font-size:13px;
  }
  .ticker-item{color:var(--muted);}
  .ticker-item b{color:var(--text);font-weight:600;}
  .ticker-item.hm b{color:var(--amber);}
  .ticker-item.cp b{color:var(--teal);}

  .controls{
    max-width:1200px;
    margin:20px auto 0;
    padding:0 24px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .filter-group{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pattern-filters{
    max-width:1200px;
    margin:8px auto 0;
    padding:0 24px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pattern-chip{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--muted);
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:999px;
    padding:6px 10px;
    cursor:pointer;
  }
  .pattern-chip input{accent-color:var(--teal); cursor:pointer;}
  .summary{max-width:1200px;margin:16px auto 0;padding:0 24px;}
  .summary-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--muted);
    font-family:var(--mono);
    font-size:12px;
  }
  .seg{
    display:flex;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .seg button{
    background:var(--panel);
    color:var(--muted);
    border:none;
    padding:8px 14px;
    font-family:var(--sans);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    border-right:1px solid var(--border);
  }
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--text);color:var(--bg);}
  .seg button:hover:not(.active){color:var(--text);}

  input[type="search"], select{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 12px;
    border-radius:8px;
    font-family:var(--sans);
    font-size:13px;
    outline:none;
  }
  input[type="search"]{min-width:180px;}
  input[type="search"]::placeholder{color:var(--muted);}

  main{
    max-width:1200px;
    margin:24px auto 60px;
    padding:0 24px;
  }
  .section-title{
    font-family:var(--mono);
    font-size:16px;
    font-weight:600;
    margin:32px 0 16px;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
    color:var(--text);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }
  @media (max-width:900px){
    .grid{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:640px){
    .grid{grid-template-columns:1fr;}
    .title-row{flex-direction:column;}
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-left:4px solid var(--muted);
    border-radius:10px;
    padding:16px 18px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .card.hm{border-left-color:var(--amber);}
  .card.cp{border-left-color:var(--teal);}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .symbol{
    font-family:var(--mono);
    font-size:18px;
    font-weight:600;
  }
  .ea-name{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
    word-break:break-all;
  }
  .badge{
    font-family:var(--sans);
    font-size:10px;
    font-weight:600;
    padding:3px 8px;
    border-radius:100px;
    white-space:nowrap;
    text-transform:uppercase;
    letter-spacing:0.3px;
    display:inline-block;
    margin-top:4px;
  }
  .badge.hm{background:var(--amber-dim);color:var(--amber);}
  .badge.cp{background:var(--teal-dim);color:var(--teal);}
  .badge.cap{background:rgba(63,167,150,0.15);color:var(--teal);border:1px solid rgba(63,167,150,0.25);}
  .badge.pattern{background:rgba(212,169,74,0.12);color:var(--amber);border:1px solid rgba(212,169,74,0.25);}
  .badge.reserve{background:rgba(115,85,255,0.10);color:var(--teal);border:1px solid rgba(115,85,255,0.18);} 
  .badge.status{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    margin-left:6px;
  }

  /* ปรับแต่งพื้นที่แสดงผลกราฟ Radar ในการ์ดรายตัว */
  .chart-container {
    position: relative;
    width: 100%;
    height: 180px;
    margin: 12px 0;
  }

  .net-profit{
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .net-profit-label{font-size:11px;color:var(--muted);}
  .net-profit-value{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);}

  /* สไตล์สำหรับส่วนกราฟเปรียบเทียบรวมและอันดับท้ายเว็บบอร์ด */
  .comparison-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
  }
  .comparison-layout {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .global-chart-wrap {
    flex: 1;
    max-height: 400px;
    position: relative;
  }
  .rank-list-wrap {
    width: 350px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .rank-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-index { color: var(--muted); width: 24px; }
  .rank-name { flex: 1; font-weight: 500; }
  .rank-val { font-weight: 600; }

  @media (max-width: 850px) {
    .comparison-layout { flex-direction: column; }
    .rank-list-wrap { width: 100%; }
  }

  footer{
    text-align:center;
    padding:20px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    border-top:1px solid var(--border);
    margin-top:60px;
  }
</style>
</head>

    <div class="comparison-layout">
      <div class="global-chart-wrap">

        <div id="rankList"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  9AU FOREX EA — Optimized Performance Spider Charts
</footer>

<script>
const DATA = JSON.parse(document.getElementById('ea-data').textContent);
const eaList = DATA.ea;

// หาค่า Max/Min สถิติทั้งหมดสำหรับสเกลข้อมูลเชิงเปรียบเทียบใน Spider Chart (0.0 - 1.0)
const bounds = {
  sharpe: { min: Math.min(...eaList.map(e => e.sharpe)), max: Math.max(...eaList.map(e => e.sharpe)) },
  pf: { min: Math.min(...eaList.map(e => e.pf)), max: Math.max(...eaList.map(e => e.pf)) },
  rf: { min: Math.min(...eaList.map(e => e.rf)), max: Math.max(...eaList.map(e => e.rf)) },
  winrate: { min: Math.min(...eaList.map(e => e.winrate)), max: Math.max(...eaList.map(e => e.winrate)) },
  dd: { min: Math.min(...eaList.map(e => e.dd)), max: Math.max(...eaList.map(e => e.dd)) }
};

function normalize(val, type) {
  const { min, max } = bounds[type];
  if (max === min) return 0.5;
  let normalized = (val - min) / (max - min);
  // สำหรับ DD ยิ่งต่ำยิ่งดี ให้สลับแกนเพื่อดึงเส้นกราฟให้กว้างเมื่อเสี่ยงต่ำ
  if (type === 'dd') normalized = 1 - normalized;
  return normalized;
}

let activeCharts = [];
let globalRadarChart = null;

function modeClass(mode){ return mode === 'House Money' ? 'hm' : 'cp'; }
function modeColor(mode){ return mode === 'House Money' ? '#D4A94A' : '#3FA796'; }

function renderTicker(){
  const hm = eaList.filter(e => e.mode === 'House Money').length;
  const cp = eaList.filter(e => e.mode === 'Compound').length;
  const avgSharpe = (eaList.reduce((s,e)=>s+e.sharpe,0)/eaList.length).toFixed(2);
  document.getElementById('ticker').innerHTML = `
    <span class="ticker-item">EA ทั้งหมด <b>${eaList.length}</b></span>
    <span class="ticker-item hm">House Money <b>${hm}</b></span>
    <span class="ticker-item cp">Compound <b>${cp}</b></span>
    <span class="ticker-item">Avg Sharpe <b>${avgSharpe}</b></span>
  `;
  document.getElementById('updated').textContent = 'Updated ' + DATA.generated;
}

function renderSummary(list){
  const summary = document.getElementById('summary');
  const portFilter = document.getElementById('portFilter').value;
  const regimeFilter = document.getElementById('regimeFilter').value;

  if(portFilter !== 'all' && list.length){
    const first = list.find(e => e.port_group === portFilter) || list[0];
    const members = [...new Set(list.flatMap(e => e.port_members || []))].join(', ');
    summary.innerHTML = `<div class="summary-box">${portFilter} | Combine Capital ${first.combine_capital} | Members: ${members || '—'}</div>`;
  } else if(regimeFilter !== 'all' && list.length){
    const members = [...new Set(list.map(e => e.symbol))].join(', ');
    summary.innerHTML = `<div class="summary-box">Members: ${members}</div>`;
  } else {
    summary.innerHTML = '';
  }
}

function renderCardsAndCharts(list){
  const grid = document.getElementById('grid');
  activeCharts.forEach(c => c.destroy());
  activeCharts = [];

  if(!list.length){
    grid.innerHTML = '<div class="card"><div class="ea-name">No EA matches the current filters.</div></div>';
    return;
  }

  // สร้างโครงสร้าง HTML สำหรับการ์ด
  grid.innerHTML = list.map((e, idx) => {
    const mc = modeClass(e.mode);
    const statusBadge = e.status !== 'Active' ? `<span class="badge status">${e.status}</span>` : '';
    const patterns = (e.patterns || e.pattern || []).join(' · ');
    const regimeLabel = e.is_adaptive_regime ? 'Adaptive' : 'Static';
    const baseCap = e.base_capital || null;
    const reserveCap = e.reserve_capital || null;
    const capDetail = baseCap ? `${baseCap}+${reserveCap}R` : `${e.own_capital}`;
    const capitalBadge = e.port_group ? `<span class="badge cap">[CAP ${e.own_capital} (${capDetail})] → [COMBINE ${e.combine_capital}]</span>` : '';
    const patternBadge = patterns ? `<span class="badge pattern">${patterns} · ${regimeLabel}</span>` : '';
    const reserveBadge = (e.patterns || []).includes('Reserve-Capital') ? `<span class="badge reserve">Reserve System</span>` : '';
    
    return `
      <div class="card ${mc}">
        <div>
          <div class="card-top">
            <div>
              <div class="symbol">${e.symbol}</div>
              <div class="ea-name">${e.name}</div>
            </div>
            <div><span class="badge ${mc}">${e.mode}</span>${statusBadge}</div>
          </div>
          <div class="badge-row">
            ${capitalBadge}
            ${patternBadge}
            ${reserveBadge}
          </div>
        </div>
        
        <!-- ส่วนพื้นที่แสดงผลกราฟ Spider -->
        <div class="chart-container">
          <canvas id="chart-${idx}"></canvas>
        </div>

        <div class="net-profit">
          <span class="net-profit-label">Net Profit</span>
          <span class="net-profit-value">${e.net_profit.toFixed(2)}%</span>
        </div>
      </div>
    `;
  }).join('');

  // เริ่มวาดกราฟลงในการ์ดแต่ละใบด้วย Chart.js
  list.forEach((e, idx) => {
    const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
    const color = modeColor(e.mode);
    
    const chart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Sharpe', 'PF', 'RF', 'Win Rate', 'Low DD'],
        datasets: [{
          data: [
            normalize(e.sharpe, 'sharpe'),
            normalize(e.pf, 'pf'),
            normalize(e.rf, 'rf'),
            normalize(e.winrate, 'winrate'),
            normalize(e.dd, 'dd')
          ],
          backgroundColor: color + '22',
          borderColor: color,
          borderWidth: 2,
          pointBackgroundColor: color,
          pointRadius: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            grid: { color: '#232938' },
            angleLines: { color: '#232938' },
            pointLabels: { color: '#7A8699', font: { family: 'IBM Plex Mono', size: 10 } },
            ticks: { display: false },
            min: 0,
            max: 1
          }
        }
      }
    });
    activeCharts.push(chart);
  });
}

function renderGlobalComparisonAndRanking(list, sortBy){
  // 1. เรนเดอร์ส่วนตารางอันดับ Rank List ขวามือ
  const rankList = document.getElementById('rankList');
  rankList.innerHTML = list.map((e, idx) => {
    let displayVal = '';
    if (sortBy === 'sharpe') displayVal = e.sharpe.toFixed(2);
    if (sortBy === 'pf') displayVal = e.pf.toFixed(2);
    if (sortBy === 'dd') displayVal = e.dd.toFixed(2) + '%';
    if (sortBy === 'net_profit') displayVal = e.net_profit.toFixed(2) + '%';

    return `
      <div class="rank-item">
        <span class="rank-index">${idx + 1}</span>
        <span class="rank-name" style="color:${modeColor(e.mode)}">${e.symbol}</span>
        <span class="rank-val">${displayVal}</span>
      </div>
    `;
  }).join('');

  // 2. เรนเดอร์กราฟเปรียบเทียบรวม (จำกัดแสดงท็อป 5 ตัวแรกเพื่อไม่ให้เส้นกราฟซ้อนกันจนมองไม่รู้เรื่อง)
  if (globalRadarChart) globalRadarChart.destroy();
  const ctx = document.getElementById('globalRadarChart').getContext('2d');
  
  const displayLimit = Math.min(list.length, 5);
  const datasets = list.slice(0, displayLimit).map((e, idx) => {
    const baseColor = modeColor(e.mode);
    // ปรับความทึบแสงของเส้นตามลำดับ Rank (อันดับแรกสุดจะเด่นชัดที่สุด)
    const alpha = (1 - (idx * 0.15)).toFixed(2); 
    return {
      label: e.symbol,
      data: [
        normalize(e.sharpe, 'sharpe'),
        normalize(e.pf, 'pf'),
        normalize(e.rf, 'rf'),
        normalize(e.winrate, 'winrate'),
        normalize(e.dd, 'dd')
      ],
      backgroundColor: 'transparent',
      borderColor: baseColor,
      borderWidth: idx === 0 ? 3 : 1.5,
      pointBackgroundColor: baseColor,
      pointRadius: idx === 0 ? 3 : 1
    };
  });

  globalRadarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['Sharpe', 'PF', 'RF', 'Win Rate', 'Low DD'],
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#E8EAED', font: { family: 'IBM Plex Mono', size: 11 } }
        }
      },
      scales: {
        r: {
          grid: { color: '#232938' },
          angleLines: { color: '#232938' },
          pointLabels: { color: '#E8EAED', font: { family: 'Inter', size: 12, weight: '600' } },
          ticks: { display: false },
          min: 0,
          max: 1
        }
      }
    }
  });
}

function applyFiltersAndRender(){
  const mode = document.querySelector('#modeFilter button.active').dataset.mode;
  const query = document.getElementById('search').value.trim().toLowerCase();
  const sortBy = document.getElementById('sortBy').value;
  const port = document.getElementById('portFilter').value;
  const regime = document.getElementById('regimeFilter').value;
  const selectedPatterns = Array.from(document.querySelectorAll('#patternFilters input:checked')).map(cb => cb.value);

  let list = eaList.filter(e => mode === 'all' || e.mode === mode);
  if(port !== 'all'){
    list = list.filter(e => e.port_group === port);
  }
  if(regime !== 'all'){
    list = list.filter(e => (e.is_adaptive_regime ? 'Adaptive Regime' : 'Static') === regime);
  }
  if(selectedPatterns.length){
    list = list.filter(e => {
      const patterns = e.patterns || e.pattern || [];
      return selectedPatterns.some(p => patterns.includes(p));
    });
  }
  if(query){
    list = list.filter(e => e.symbol.toLowerCase().includes(query) || e.name.toLowerCase().includes(query));
  }
  list = [...list].sort((a,b) => {
    if(sortBy === 'dd') return a.dd - b.dd;
    return b[sortBy] - a[sortBy];
  });
  
  renderSummary(list);
  renderCardsAndCharts(list);
  renderGlobalComparisonAndRanking(list, sortBy);
}

document.querySelectorAll('#modeFilter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#modeFilter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFiltersAndRender();
  });
});
document.getElementById('sortBy').addEventListener('change', applyFiltersAndRender);
document.getElementById('portFilter').addEventListener('change', applyFiltersAndRender);
document.getElementById('regimeFilter').addEventListener('change', applyFiltersAndRender);
document.getElementById('search').addEventListener('input', applyFiltersAndRender);
document.querySelectorAll('#patternFilters input').forEach(cb => cb.addEventListener('change', applyFiltersAndRender));

renderTicker();
applyFiltersAndRender();
</script>
